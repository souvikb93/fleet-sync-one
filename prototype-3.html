<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Honda Fleet — Choose Route</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{

  --red:#E60012;--dark:#1A1A1A;--muted:#666;

  --white:#FFF;--tile:#F5F5F7;--green:#2EAD4B;

  --yellow:#D97706;--yellow-bg:#FFF8E1;--yellow-border:#EED44A;

  --red-light:#FEF0F0;--border:#E4E5E8

}

html,body{margin:0;padding:0;background:transparent;overflow:hidden;font-family:'Inter',sans-serif;color:var(--dark);height:100vh}

.iphone{width:277px;height:600px;background:#000;border-radius:40px;padding:8px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:inset 0 0 0 2px #222,0 0 0 2px #333}

.iphone::before{content:'';position:absolute;right:-3px;top:128px;width:3px;height:50px;

  background:#222;border-radius:0 2px 2px 0}

.iphone::after{content:'';position:absolute;left:-3px;top:107px;width:3px;height:27px;

  background:#222;border-radius:2px 0 0 2px;box-shadow:0 39px 0 #222,0 64px 0 #222}

.screen{width:100%;height:100%;background:var(--white);border-radius:32px;overflow:hidden;

  display:flex;flex-direction:column;position:relative}

.island{position:absolute;top:7px;left:50%;transform:translateX(-50%);width:85px;height:24px;

  background:#000;border-radius:14px;z-index:20}

.status-bar{background:var(--white);padding:11px 17px 0;display:flex;justify-content:space-between;

  align-items:center;font-size:11px;font-weight:600;flex-shrink:0;height:36px}

.topbar{background:var(--white);display:flex;justify-content:space-between;align-items:center;

  padding:4px 14px 7px;flex-shrink:0;border-bottom:1px solid var(--border)}

.ham{display:flex;flex-direction:column;gap:3px;cursor:pointer;padding:6px}

.ham span{width:14px;height:2px;background:var(--red);border-radius:2px}

.sheet-foot{padding:16px 24px;flex-shrink:0;border-top:1px solid var(--border);

  display:flex;align-items:center;height:64px;box-sizing:border-box}

.btn-nav{width:100%;padding:9px;border:none;border-radius:8px;font-size:10px;font-weight:700;

  font-family:'Inter',sans-serif;cursor:pointer;background:var(--red);color:var(--white);display:flex;align-items:center;justify-content:center}

.btn-nav:active{background:#d00011;transform:scale(.98)}

.tab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:0 8px}

.tab svg{width:16px;height:16px}

.tab .tl{font-size:8px;font-weight:400;color:#BBB}

.tab.on svg path,.tab.on svg circle{stroke:var(--red);fill:var(--red-light)}

.tab.on .tl{color:var(--red);font-weight:600}

.tab:not(.on) svg path,.tab:not(.on) svg circle{stroke:#CCC;fill:none}

.overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:#0000007A;z-index:10;pointer-events:none}

.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--white);

  border-radius:20px 20px 0 0;height:88%;display:flex;flex-direction:column;

  box-shadow:0 -4px 20px rgba(0,0,0,.15);z-index:11}

.sheet-handle{width:36px;height:4px;background:#DDD;border-radius:2px;margin:8px auto 12px;flex-shrink:0}

.sheet-head{padding:0 14px 12px;flex-shrink:0;display:flex;justify-content:space-between;

  align-items:center;border-bottom:1px solid var(--border)}

.sheet-head h1{font-size:16px;font-weight:600}

.close-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer}

.close-btn svg{width:16px;height:16px;stroke:var(--muted);stroke-width:2.5;fill:none;

  stroke-linecap:round;stroke-linejoin:round}

.sheet-body{flex:1;overflow:hidden;padding:12px;scrollbar-width:none}

.sheet-body::-webkit-scrollbar{display:none}

.foot-info h3{font-size:10px;font-weight:700;color:var(--dark)}

.foot-info p{font-size:8px;color:var(--muted);margin-top:2px}

.btn-sm{padding:8px 14px;border:none;border-radius:6px;font-size:9px;font-weight:700;

  font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;

  background:var(--red);color:var(--white)}

.btn-sm:active{background:#d00011;transform:scale(.98)}

.route-map{height:195px;flex-shrink:0;overflow:hidden;}

.route-map svg{width:100%;height:100%;display:block}

.ropt{border:1px solid var(--border);border-radius:6px;margin-bottom:8px;

  padding:10px;display:flex;align-items:center;gap:10px;cursor:pointer;

  transition:border-color .15s,background .15s}

.ropt:last-child{margin-bottom:0}

.ropt.sel{border-color:var(--red);background:var(--red-light)}

.rinfo{flex:1;min-width:0}

.rname{font-size:11px;font-weight:700;color:var(--dark);margin-bottom:6px}

.rdet{font-size:9px;color:var(--muted);display:flex;gap:8px;align-items:center}

.rdet span{display:flex;align-items:center;gap:3px}

.rdet b{color:var(--dark);font-weight:700}

.rtag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0}

.rtag.fast{background:var(--red-light);color:var(--red)}

.rtag.eco{background:#E8F5E9;color:var(--green)}

.rtag.alt{background:#EEF2FF;color:#4F46E5}

</style></head><body>

<style>
.proto-nav-toggle{position:fixed;top:8px;right:8px;z-index:9999;width:28px;height:28px;background:rgba(0,0,0,.7);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.proto-nav-toggle svg{width:14px;height:14px;fill:#fff}
.proto-nav-panel{display:none;position:fixed;top:40px;right:8px;z-index:9999;background:#1a1a1a;border-radius:10px;padding:8px;min-width:140px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.proto-nav-panel.open{display:flex;flex-direction:column;gap:4px}
.proto-nav-panel a{color:#fff;text-decoration:none;font-size:11px;font-family:Inter,sans-serif;padding:6px 10px;border-radius:6px;transition:background .15s}
.proto-nav-panel a:hover{background:rgba(255,255,255,.1)}
.proto-nav-panel a.current{background:#E60012;font-weight:600}
</style>

function selectRoute(el, key) {
