<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Order Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; }
:root {
  --red:#E60012; --red-light:#FEF0F0; --dark:#1A1A1A; --muted:#666666;
  --white:#FFFFFF; --tile:#F5F5F7; --green:#2EAD4B; --green-bg:#F0FFF4;
  --border:#E4E5E8; --r:8px; --gap:12px;
}
html, body { margin:0;padding:0;width:100%;height:100%;background:transparent;display:flex;justify-content:center;align-items:center;overflow:hidden;color:var(--dark); }
.iphone { width:277px;height:600px;background:#000;border-radius:40px;padding:10px;position:relative;flex-shrink:0;box-shadow:inset 0 0 0 2px #222,0 0 0 2px #333; }
.iphone::before { content:'';position:absolute;right:-3px;top:130px;width:3px;height:50px;background:#222;border-radius:0 3px 3px 0; }
.iphone::after { content:'';position:absolute;left:-3px;top:110px;width:3px;height:28px;background:#222;border-radius:3px 0 0 3px;box-shadow:0 42px 0 #222,0 72px 0 #222; }
.screen { width:100%;height:100%;border-radius:32px;overflow:hidden;background:var(--white);display:flex;flex-direction:column;position:relative; }
.island { position:absolute;top:8px;left:50%;transform:translateX(-50%);width:85px;height:24px;background:#000;border-radius:14px;z-index:40; }
.status-bar { flex-shrink:0;height:36px;padding:8px 14px 0;display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:600;color:var(--dark);background:var(--white);position:relative;z-index:10; }
.topbar { flex-shrink:0;display:flex;justify-content:center;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--white);position:relative;z-index:10; }
.topbar-title { font-size:16px;font-weight:600;color:var(--dark); }
.mid { flex:1;position:relative;overflow:hidden; }
.scanner { position:absolute;top:0;left:0;right:0;height:150px;background:#1A1A1A;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;z-index:1; }
.scan-frame { width:180px;height:80px;border:1.5px solid var(--red);border-radius:5px;position:relative; }
.scan-frame::before { content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--red);box-shadow:0 0 8px var(--red);animation:sweep 2s ease-in-out infinite; }
@keyframes sweep { 0%,100%{top:0} 50%{top:calc(100% - 1.5px)} }
.scan-hint { color:#888;font-size:8px;font-weight:500;margin-top:8px; }
.banner-wrap { position:absolute;top:162px;left:10px;right:10px;overflow:hidden;height:0;transition:height 0.4s ease-out;z-index:2; }
.banner { display:flex;align-items:center;gap:6px;background:var(--green-bg);border:1px solid var(--green);border-radius:var(--r);padding:8px 12px;font-size:9px;font-weight:700;color:var(--green);opacity:0;transition:opacity 0.35s ease-out 0.05s; }
.banner-wrap.show .banner { opacity:1; }
.banner svg { width:12px;height:12px;flex-shrink:0; }
.cards-wrap { position:absolute;top:174px;left:10px;right:10px;bottom:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;z-index:3;transition:top 0.4s ease-out; }
.cards-wrap::-webkit-scrollbar { display:none; }
.cards-inner { display:flex;flex-direction:column;gap:var(--gap);padding-bottom:var(--gap); }
.pkg { background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:12px; }
.pkg-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:8px; }
.pkg-title { font-size:12px;font-weight:700;color:var(--dark); }
.pkg-actions { display:flex;align-items:center;gap:10px; }
.icon-btn { width:24px;height:24px;border-radius:50%;border:1px solid var(--red);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;transition:background 0.15s; }
.icon-btn:active { background:var(--red-light); }
.icon-btn svg { width:11px;height:11px;fill:var(--red); }
.pkg-row { display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:8px;border-bottom:1px solid var(--tile); }
.pkg-row:last-child { border:none;padding-bottom:0; }
.pkg-row .label { color:var(--muted);font-weight:400; }
.pkg-row .value { font-weight:600;color:var(--dark); }
.pod { background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:12px; }
.pod-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:8px; }
.pod-title { font-size:12px;font-weight:700;color:var(--dark); }
.btn-link { background:none;border:none;padding:0;font-size:8px;font-weight:600;font-family:'Inter',sans-serif;color:var(--red);cursor:pointer;text-decoration:underline;text-underline-offset:2px; }
.pod-tiles { display:flex;gap:8px; }
.tile-btn { flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:'Inter',sans-serif; }
.tile-btn:active { background:var(--tile);transform:scale(0.98); }
.tile-icon { width:16px;height:16px;stroke:var(--dark);stroke-width:1.8;fill:none; }
.tile-label { font-size:8px;font-weight:600;color:var(--dark); }
.attachments { display:flex;flex-direction:column;gap:8px; }
.attachments:not(:empty) { margin-top:12px; }
.attach-row { display:flex;align-items:center;justify-content:space-between;background:#F0F0F0;border-radius:var(--r);padding:9px 12px;opacity:0;transform:translateY(6px);transition:opacity 0.3s ease-out,transform 0.3s ease-out; }
.attach-row.show { opacity:1;transform:translateY(0); }
.attach-name { font-size:9px;font-weight:500;color:var(--dark); }
.attach-del { background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center; }
.attach-del svg { width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round; }
.footer { flex-shrink:0;height:64px;padding:16px;display:flex;gap:8px;background:var(--white);border-top:1px solid var(--border);position:relative;z-index:10;box-sizing:border-box; }
.btn { flex:1;padding:0 9px;height:32px;border:1.5px solid transparent;border-radius:var(--r);font-size:10px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s; }
.btn:active { transform:scale(0.98); }
.btn-primary { background:var(--red);color:#fff;border-color:var(--red); }
.btn-secondary { background:var(--white);color:var(--red);border-color:var(--red); }
</style>
</head>
<body>

<style>
.proto-nav-toggle{position:fixed;top:8px;right:8px;z-index:9999;width:28px;height:28px;background:rgba(0,0,0,.7);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.proto-nav-toggle svg{width:14px;height:14px;fill:#fff}
.proto-nav-panel{display:none;position:fixed;top:40px;right:8px;z-index:9999;background:#1a1a1a;border-radius:10px;padding:8px;min-width:140px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.proto-nav-panel.open{display:flex;flex-direction:column;gap:4px}
.proto-nav-panel a{color:#fff;text-decoration:none;font-size:11px;font-family:Inter,sans-serif;padding:6px 10px;border-radius:6px;transition:background .15s}
.proto-nav-panel a:hover{background:rgba(255,255,255,.1)}
.proto-nav-panel a.current{background:#E60012;font-weight:600}
</style>
<div class="proto-nav-toggle" onclick="document.querySelector('.proto-nav-panel').classList.toggle('open')">
<svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
</div>
<div class="proto-nav-panel">
<a href="prototype-1.html" class="">1 · Home</a>
<a href="prototype-2.html" class="">2 · Choose Orders</a>
<a href="prototype-3.html" class="">3 · Choose Route</a>
<a href="prototype-4.html" class="current">4 · Verification</a>
<a href="prototype-5.html" class="">5 · Completed</a>
<a href="prototype-6.html" class="">6 · Orders</a>
</div>

<div class="iphone">
  <div class="screen">
    <div class="island"></div>
    <div class="status-bar">
      <span>9:41</span>
      <div style="display:flex;gap:5px;align-items:center">
        <svg width="14" height="10" viewBox="0 0 16 12"><rect y="7" width="3" height="5" rx=".5" fill="#1A1A1A"/><rect x="4.5" y="4" width="3" height="8" rx=".5" fill="#1A1A1A"/><rect x="9" y="1" width="3" height="11" rx=".5" fill="#1A1A1A"/><rect x="13" width="3" height="12" rx=".5" fill="#1A1A1A" opacity=".3"/></svg>
        <svg width="22" height="10" viewBox="0 0 25 12"><rect x=".5" y=".5" width="21" height="11" rx="2" stroke="#1A1A1A" stroke-opacity=".35" fill="none"/><rect x="2" y="2" width="14" height="8" rx="1" fill="#1A1A1A"/></svg>
      </div>
    </div>
    <div class="topbar"><span class="topbar-title">Order Verification</span></div>
    <div class="mid" id="mid">
      <div class="scanner">
        <div class="scan-frame"></div>
        <div class="scan-hint">Position barcode within frame</div>
      </div>
      <div class="banner-wrap" id="bannerWrap">
        <div class="banner">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Barcode scanned successfully
        </div>
      </div>
      <div class="cards-wrap" id="cardsWrap">
        <div class="cards-inner">
          <div class="pkg">
            <div class="pkg-header">
              <span class="pkg-title">Package Details</span>
              <div class="pkg-actions">
                <button class="icon-btn" title="Call"><svg viewBox="0 0 24 24"><path d="M17.4 22A15.4 15.4 0 012 6.6 4.6 4.6 0 016.6 2a1 1 0 01.9.6l2 4.4a1 1 0 01-.1 1L7.9 9.8a11.1 11.1 0 004.3 4.3l1.8-1.5a1 1 0 011-.1l4.4 2a1 1 0 01.6.9A4.6 4.6 0 0117.4 22z"/></svg></button>
                <button class="icon-btn" title="Message"><svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2zM7 9h10a1 1 0 010 2H7a1 1 0 010-2zm6 5H7a1 1 0 010-2h6a1 1 0 010 2z"/></svg></button>
              </div>
            </div>
            <div class="pkg-row"><span class="label">Order ID</span><span class="value">#HF-1042</span></div>
            <div class="pkg-row"><span class="label">Recipient</span><span class="value">Arjun Mehta</span></div>
            <div class="pkg-row"><span class="label">Items</span><span class="value">2 items</span></div>
            <div class="pkg-row"><span class="label">Weight</span><span class="value">4.5 kg</span></div>
          </div>
          <div class="pod">
            <div class="pod-header">
              <span class="pod-title">Proof of Delivery</span>
            </div>
            <div class="pod-tiles">
              <button class="tile-btn" onclick="addAttachment('photo')">
                <svg class="tile-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="14" rx="2"/><circle cx="8" cy="10" r="2"/><path d="M21 17l-5-5-4 4-3-3-3 3"/></svg>
                <span class="tile-label">Take Photo</span>
              </button>
              <button class="tile-btn" onclick="addAttachment('signature')">
                <svg class="tile-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.8 2.8 0 014 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                <span class="tile-label">Signature</span>
              </button>
              <button class="tile-btn" onclick="addAttachment('note')">
                <svg class="tile-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
                <span class="tile-label">Add Note</span>
              </button>
            </div>
            <div class="attachments" id="attachments"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="footer">
      <button class="btn btn-secondary">Report Issue</button>
      <button class="btn btn-primary" onclick="window.location.href='prototype-5.html'">Completed</button>
    </div>
  </div>
</div>
<script>
let bannerH = 0;
function triggerSuccess() {
  const bannerWrap = document.getElementById('bannerWrap');
  const cardsWrap  = document.getElementById('cardsWrap');
  bannerWrap.style.transition = 'none';
  bannerWrap.style.height = 'auto';
  bannerH = bannerWrap.offsetHeight;
  bannerWrap.style.height = '0';
  requestAnimationFrame(() => {
    bannerWrap.style.transition = 'height 0.4s ease-out';
    bannerWrap.style.height = bannerH + 'px';
    bannerWrap.classList.add('show');
  });
  setTimeout(() => { cardsWrap.style.top = (174 + bannerH) + 'px'; }, 150);
}
window.addEventListener('load', () => setTimeout(triggerSuccess, 2000));
let n = 0;
const types = { photo:{label:'Photo',ext:'jpg'}, signature:{label:'Signature',ext:'png'}, note:{label:'Note',ext:'txt'} };
function addAttachment(type) {
  n++;
  const id = 'att' + n;
  const { label, ext } = types[type];
  const list = document.getElementById('attachments');
  const row = document.createElement('div');
  row.className = 'attach-row'; row.id = id;
  row.innerHTML = `<span class="attach-name">${label}_${n}.${ext}</span><button class="attach-del" onclick="removeAttachment('${id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>`;
  list.appendChild(row);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    row.classList.add('show');
    setTimeout(() => row.scrollIntoView({ behavior:'smooth', block:'nearest' }), 150);
  }));
}
function removeAttachment(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.opacity = '0'; el.style.transform = 'translateY(6px)';
  setTimeout(() => el.remove(), 300);
}
</script>
</body>
</html>
